services:
  servers_host_update:
    build:
      context: .
      dockerfile: Dockerfile
    healthcheck:
      test: curl --fail http://localhost:5000 || bash -c 'kill -s 15 -1 && (sleep 10; kill -s 9 -1)'
      interval: 30s
      timeout: 10s
      retries: 5
    container_name: servers_host_update
    restart: unless-stopped
    volumes:
      - ./app/.env:/app/.env:ro

    ports:
      - 5000:5000